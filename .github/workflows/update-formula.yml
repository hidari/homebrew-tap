name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      formula:
        description: 'Formula name (e.g., rip, love)'
        required: true
        type: string
      version:
        description: 'Version (e.g., v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "formula=${{ github.event.client_payload.formula }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "formula=${{ inputs.formula }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Update Formula
        run: |
          chmod +x ./scripts/update-formula.sh
          ./scripts/update-formula.sh "${{ steps.vars.outputs.formula }}" "${{ steps.vars.outputs.version }}"

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add Formula/
          git diff --cached --quiet || (
            git commit -m "feat: update ${{ steps.vars.outputs.formula }} to ${{ steps.vars.outputs.version }}"
            git push
          )
